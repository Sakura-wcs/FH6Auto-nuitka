name: Build and Release FH6Auto

on:
  push:
    tags:
      - 'v*'  # 当推送以 v 开头的 tag 时触发
  workflow_dispatch:      # 允许在网页端纯手动点击触发

jobs:
  build-and-release:
    runs-on: windows-latest
    
    # 强制使用 Node.js 24，彻底消除旧版本弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'

    - name: Install Dependencies
      run: |
        chcp 65001
        python -m pip install --upgrade pip
        if (Test-Path -Path "requirements.txt") { pip install -r requirements.txt }
        pip install nuitka

    - name: Nuitka Build (Standalone + Plugins + CTk Resource Fix)
      shell: python
      run: |
        import os, subprocess, site
        
        # 自动定位 customtkinter 资源目录，防止界面变白板或报错
        site_packages = site.getsitepackages()[0]
        ctk_path = os.path.join(site_packages, "customtkinter")
        
        # 组装完整的 Nuitka 编译命令（带 tk 和 numpy 插件）
        command = [
            "python", "-m", "nuitka",
            "--standalone",
            "--windows-uac-admin",
            "--enable-plugin=tk-inter",
            "--enable-plugin=numpy",
            "--assume-yes-for-downloads",
            f"--include-data-dir={ctk_path}=customtkinter",
            "--output-dir=build_out",
            "main.py"
        ]
        
        print(f"Running command: {' '.join(command)}")
        subprocess.run(command, check=True)

    - name: Extract Version
      shell: python
      env:
        PYTHONIOENCODING: utf-8
      run: |
        import re, os
        with open('main.py', 'r', encoding='utf-8') as f:
            match = re.search(r'CURRENT_VERSION\s*=\s*"([^"]+)"', f.read())
        
        version = match.group(1) if match else "1.0.0"
        
        # 必须是纯英文，防止 Windows 运行器出现编码崩溃
        print(f"Extracted version: {version}")
        
        with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env_file:
            env_file.write(f"APP_VERSION={version}\n")

    - name: Inno Setup Build
      shell: cmd  # 使用 cmd 彻底规避 PowerShell 的路径空格语法解析错误
      run: |
        chcp 65001
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=%APP_VERSION%" build_installer.iss

    - name: Upload Artifact (供手动触发时下载安装包)
      uses: actions/upload-artifact@v4
      with:
        name: FH6Auto_Installer_v${{ env.APP_VERSION }}
        path: Release/FH6Auto_Installer_v*.exe
        compression-level: 0 # 安装包已压缩，设为 0 加快上传速度

    - name: Publish to GitHub Release (Tag 或 手动触发)
      uses: softprops/action-gh-release@v2
      # 【核心修改】：允许 Tag 触发 (refs/tags/) 或 手动触发 (workflow_dispatch) 执行发布
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        files: Release/FH6Auto_Installer_v*.exe
        # 如果是手动触发，系统没有 Tag 名称，我们需要手动指定一个 Tag 名字
        tag_name: v${{ env.APP_VERSION }}
        name: Release v${{ env.APP_VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
